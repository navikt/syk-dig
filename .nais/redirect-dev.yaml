apiVersion: networking.k8s.io/v1
kind: 'Ingress'
metadata:
  annotations:
    haproxy.org/backend-config-snippet: |
      http-request redirect location https://syk-dig.intern.dev.nav.no/utenlandsk/%[url_param(oppgaveid)] code 302 if { path_reg ^/smd(/|$) }
      http-request redirect location https://syk-dig.intern.dev.nav.no/nasjonal/%[url_param(oppgaveid)] code 302 if { path_reg ^/smr(/|$) }
      http-request redirect location https://syfosmmanuell.intern.dev.nav.no/oppgave/%[url_param(oppgaveid)] code 302 if { path_reg ^/smm(/|$) }
  labels:
    app: syk-dig
    team: teamsykmelding
  name: oppgaver-gosys-redirect
  namespace: teamsykmelding
spec:
  ingressClassName: internal-haproxy
  rules:
    - host: sykmelding-redirect.intern.dev.nav.no
      http:
        paths:
          - backend:
              service:
                name: syk-dig
                port:
                  number: 80
            path: /smd
            pathType: Prefix
          - backend:
              service:
                name: syk-dig
                port:
                  number: 80
            path: /smr
            pathType: Prefix
          - backend:
              service:
                name: syk-dig
                port:
                  number: 80
            path: /smm
            pathType: Prefix
